name: Xsign
options:
  bundleIdPrefix: com.example
targets:
  Xsign:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: [Xsign]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Xsign/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_BITCODE: NO
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - package: ZIPFoundation
      - package: Swifter
      - package: Zsign
      - package: Lottie
      - package: BitByteData
      - package: Zip
      - package: SWCompression
      - package: OpenSSL
      - package: Crypto
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19
  Swifter:
    url: https://github.com/httpswifter/swifter.git
    from: 1.5.0
  Zsign:
    url: https://github.com/CLARATION/Zsign-Package.git
    branch: package
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: 4.4.1
  BitByteData:
    url: https://github.com/tsolomko/BitByteData
    from: 2.0.4
  Zip:
    url: https://github.com/marmelroy/Zip.git
    from: 2.1.2
  SWCompression:
    url: https://github.com/tsolomko/SWCompression
    from: 4.8.6
  OpenSSL:
    url: https://github.com/krzyzanowskim/OpenSSL
    from: 3.3.3001
  Crypto:
    url: https://github.com/apple/swift-crypto.git
    from: 3.12.3
