name: Xsign

options:
  bundleIdPrefix: com.xsign
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  disableShowEnvironmentVarsInScriptPhases: true

# ====================== PACKAGES ======================
packages:
  BitByteData:
    url: https://github.com/tsolomko/BitByteData
    from: 2.0.4

  SWCompression:
    url: https://github.com/tsolomko/SWCompression
    from: 4.8.6

  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19

  lottie-ios:
    url: https://github.com/airbnb/lottie-ios
    from: 4.4.1

  swift-crypto:
    url: https://github.com/apple/swift-crypto
    from: 3.12.3

  Zip:
    url: https://github.com/marmelroy/Zip
    from: 2.1.2

  vapor:
    url: https://github.com/vapor/vapor
    from: 4.92.0

  Zsign:
    path: Zsign

# ====================== TARGETS ======================
targets:
  Xsign:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    
    sources:
      - path: Xsign
        includes:
          - "**/*.swift"
          - "**/*.h"
          - "**/*.m"
          - "**/*.mm"
        excludes:
          - "**/Resources/**"
          - "**/External/**"
          - "Xsign.xcodeproj/**"
          - ".build/**"
          - "DerivedData/**"

    resources:
      - path: Xsign/Resources
        includes:
          - "**/*"
      - path: Xsign/Resources/Assets.xcassets
        includes:
          - "**/*"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xsign.Xsign
        INFOPLIST_FILE: Xsign/Resources/Info.plist
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_BITCODE: NO
        ONLY_ACTIVE_ARCH: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

    dependencies:
      # Swift Packages
      - package: BitByteData
      - package: SWCompression
      - package: ZIPFoundation
        product: ZIPFoundation
      - package: lottie-ios
        product: Lottie
      - package: swift-crypto
        product: Crypto
      - package: Zip
        product: Zip
      - package: vapor
        product: Vapor
      - package: Zsign
        product: Zsign

# ====================== SCHEMES ======================
schemes:
  Xsign:
    build:
      targets:
        Xsign: all
    archive:
      configuration: Release
      revealArchiveInOrganizer: true

  Xsign-Release:
    build:
      targets:
        Xsign: all
    archive:
      configuration: Release
      revealArchiveInOrganizer: true
