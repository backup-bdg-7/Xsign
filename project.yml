name: Xsign
options:
  bundleIdPrefix: com.example
targets:
  Xsign:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Xsign
        excludes:
          - "External/**"
          - "App/Views/**"
          - "App/Models/**"
          - "App/Controllers/**"
          - "App/Bridge/**"
          - "App/Resources/**"
    settings:
      base:
        INFOPLIST_FILE: Xsign/Resources/Info.plist
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
