name: Xsign

options:
  bundleIdPrefix: com.xsign
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  disableShowEnvironmentVarsInScriptPhases: true

# ====================== PACKAGES ======================
packages:
  BitByteData:
    url: https://github.com/tsolomko/BitByteData
    from: 2.0.4

  SWCompression:
    url: https://github.com/tsolomko/SWCompression
    from: 4.8.6

  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19

  lottie-ios:
    url: https://github.com/airbnb/lottie-ios
    from: 4.4.1

  swift-crypto:
    url: https://github.com/apple/swift-crypto
    from: 3.12.3

  Zip:
    url: https://github.com/marmelroy/Zip
    from: 2.1.2

  vapor:
    url: https://github.com/vapor/vapor
    from: 4.92.0

# ====================== TARGETS ======================
targets:
  XsignBridge:
    type: framework
    platform: iOS
    sources:
      - path: Xsign/External/zsign/src
        excludes:
          - "**/*.cpp"  # Exclude all C++ files for now
          - "**/*.h"    # Exclude all headers for now
          - "third-party/**"
    settings:
      base:
        HEADER_SEARCH_PATHS: ["$(SRCROOT)/Xsign/External/zsign/src", "$(SRCROOT)/Xsign/External/openssl/include"]
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        GCC_C_LANGUAGE_STANDARD: "c11"

  Xsign:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    
    sources:
      - path: Xsign
        includes:
          - "**/*.swift"
          - "**/*.h"
          - "**/*.m"
          - "**/*.mm"
        excludes:
          - "**/Bridge/**"
          - "**/Resources/**"
          - "Xsign.xcodeproj/**"
          - ".build/**"
          - "DerivedData/**"
          - "**/External/**"

    resources:
      - path: Xsign/Resources
        includes:
          - "**/*"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xsign.Xsign
        INFOPLIST_FILE: Xsign/Resources/Info.plist
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SWIFT_OBJC_BRIDGING_HEADER: Xsign/App/Bridge/Xsign-Bridging-Header.h
        ENABLE_BITCODE: NO
        ONLY_ACTIVE_ARCH: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: NO

    dependencies:
      - target: XsignBridge
      
      # Swift Packages
      - package: BitByteData
      - package: SWCompression
      - package: ZIPFoundation
        product: ZIPFoundation
      - package: lottie-ios
        product: Lottie           # ← This was the bug (was lottie-ios)
      - package: swift-crypto
        product: Crypto
      - package: Zip
        product: Zip
      - package: vapor
        product: Vapor

# ====================== SCHEMES ======================
schemes:
  Xsign:
    build:
      targets:
        Xsign: all
    archive:
      configuration: Release
      revealArchiveInOrganizer: true

  Xsign-Release:
    build:
      targets:
        Xsign: all
    archive:
      configuration: Release
      revealArchiveInOrganizer: true
