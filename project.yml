name: Xsign
options:
  bundleIdPrefix: com.example
targets:
  Xsign:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Xsign
      - path: Xsign/External/zsign/src
        excludes:
          - "zsign.cpp" # Avoid duplicate main
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Xsign/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: Xsign/App/Xsign-Bridging-Header.h
        ENABLE_BITCODE: NO
        CODE_SIGNING_ALLOWED: NO
        CLANG_ENABLE_MODULES: YES
        SWIFT_VERSION: 5.0
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Xsign/External/zsign/src
          - $(SRCROOT)/Xsign/External/zsign/src/common
    dependencies:
      - package: ZIPFoundation
      - package: Swifter
      - package: Lottie
      - package: BitByteData
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19
  Swifter:
    url: https://github.com/httpswifter/swifter.git
    from: 1.5.0
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: 4.4.1
  BitByteData:
    url: https://github.com/tsolomko/BitByteData
    from: 2.0.4
