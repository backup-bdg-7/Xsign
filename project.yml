name: Xsign
options:
  bundleIdPrefix: com.example
targets:
  Xsign:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Xsign
        excludes:
          - "External/zsign/src/zsign.cpp"
          - "External/zsign/test/**"
          - "External/zsign/build/**"
          - "External/zsign/README.md"
          - "External/zsign/README.zh-CN.md"
          - "External/zsign/LICENSE"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Xsign/Resources/Info.plist
        # ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon  # Disabled - icon causing build errors
        SWIFT_OBJC_BRIDGING_HEADER: Xsign/App/Bridge/Xsign-Bridging-Header.h
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: 1
        ENABLE_BITCODE: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CLANG_ENABLE_MODULES: YES
        SWIFT_VERSION: 5.9
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Xsign/External/zsign/src
          - $(SRCROOT)/Xsign/External/zsign/src/common
          - $(SRCROOT)/Xsign/External/zsign/src/third-party
        OTHER_LDFLAGS:
          - -lz
        OTHER_CPLUSPLUSFLAGS: -std=c++17
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - ZSIGN_VERSION=1.0.0
    dependencies:
      - package: ZIPFoundation
      - package: Vapor
      - package: Lottie
      - package: BitByteData
      - package: Zip
      - package: SWCompression
      - package: OpenSSL
      - package: Crypto
schemes:
  Xsign:
    build:
      targets:
        Xsign: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19
  Vapor:
    url: https://github.com/vapor/vapor.git
    from: 4.92.0
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: 4.4.1
  BitByteData:
    url: https://github.com/tsolomko/BitByteData
    from: 2.0.4
  Zip:
    url: https://github.com/marmelroy/Zip.git
    from: 2.1.2
  SWCompression:
    url: https://github.com/tsolomko/SWCompression
    from: 4.8.6
  OpenSSL:
    url: https://github.com/krzyzanowskim/OpenSSL
    from: 3.3.3001
  Crypto:
    url: https://github.com/apple/swift-crypto.git
    from: 3.12.3
