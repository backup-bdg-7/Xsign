# XcodeGen project configuration for Xsign
# This file is automatically generated and used by the GitHub Actions workflow

name: Xsign
options:
  bundleIdPrefix: com.xsign
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.19"
  lottie-ios:
    url: https://github.com/airbnb/lottie-ios.git
    from: "4.4.1"
  BitByteData:
    url: https://github.com/tsolomko/BitByteData
    from: "2.0.4"
  SWCompression:
    url: https://github.com/tsolomko/SWCompression
    from: "4.8.6"
  swift-crypto:
    url: https://github.com/apple/swift-crypto.git
    from: "3.12.3"
  vapor:
    url: https://github.com/vapor/vapor.git
    from: "4.92.0"
  Zip:
    url: https://github.com/marmelroy/Zip.git
    from: "2.1.2"

targets:
  XsignBridge:
    type: framework
    platform: iOS
    sources:
      - path: Xsign/App/Bridge
        includes:
          - "*.h"
          - "*.m"
          - "*.mm"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.xsign.XsignBridge
      SKIP_INSTALL: "YES"
      BUILD_LIBRARY_FOR_DISTRIBUTION: "YES"
      CLANG_ENABLE_MODULES: "YES"
      PUBLIC_HEADERS_FOLDER_PATH: "$(PRODUCT_NAME)"
    dependencies: []

  Xsign:
    type: application
    platform: iOS
    sources:
      - path: Xsign/App
        includes:
          - "XsignApp.swift"
        excludes:
          - "Bridge/**"
      - path: Xsign/Models
      - path: Xsign/Views
      - path: Xsign/Services
      - path: Xsign/Shared
    resources:
      - path: Xsign/Resources
        includes:
          - "**/*"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.xsign.Xsign
      INFOPLIST_FILE: Xsign/Resources/Info.plist
      SWIFT_VERSION: "5.9"
      ENABLE_SWIFTUI: "YES"
      SWIFT_STRICT_CONCURRENCY: "complete"
      # Bridging header for Objective-C compatibility
      SWIFT_OBJC_BRIDGING_HEADER: "$(SRCROOT)/Xsign/App/Bridge/Xsign-Bridging-Header.h"
      # SwiftData requires iOS 17+
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      # Code signing (adjust as needed)
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
    dependencies:
      - target: XsignBridge
      - package: ZIPFoundation
      - package: lottie-ios
      - package: BitByteData
      - package: SWCompression
      - package: swift-crypto
      - package: vapor
      - package: Zip
    preBuildScripts:
      - name: "Check SwiftLint"
        script: |
          if which swiftlint >/dev/null; then
            swiftlint --config ${SRCROOT}/.swiftlint.yml || true
          else
            echo "SwiftLint not installed, skipping..."
          fi
        basedOnDependencyAnalysis: false
