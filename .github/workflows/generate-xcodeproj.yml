name: Analyze & Generate Xcode Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'   # Runs every Monday at midnight UTC

jobs:
  analyze-and-generate:
    name: Analyze Code & Generate Xcode Project
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Show Environment
        run: |
          xcodebuild -version
          sw_vers

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          echo "XcodeGen version: $(xcodegen --version)"

      - name: Analyze Project Structure
        run: |
          echo "## Project Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Swift Files" >> $GITHUB_STEP_SUMMARY
          echo "Count: $(find Xsign -name "*.swift" | wc -l | tr -d ' ')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Relevant File List" >> $GITHUB_STEP_SUMMARY
          find Xsign -type f \( -name "*.swift" -o -name "*.h" -o -name "*.m" -o -name "*.mm" \) | sort >> $GITHUB_STEP_SUMMARY

      - name: Generate Xcode Project
        run: |
          echo "## Generating Xcode Project" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Clean any existing project to prevent conflicts
          rm -rf Xsign.xcodeproj

          # Generate the project (recommended way)
          xcodegen generate --spec project.yml

          echo "✅ Xcode project successfully generated!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d "Xsign.xcodeproj" ]; then
            echo "Project directory created successfully:" >> $GITHUB_STEP_SUMMARY
            ls -la Xsign.xcodeproj/ >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ERROR: Xsign.xcodeproj was not created!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Upload Xcode Project
        uses: actions/upload-artifact@v4
        with:
          name: Xsign-xcodeproj-${{ github.sha }}
          path: Xsign.xcodeproj/
          retention-days: 90
          if-no-files-found: error

      - name: Final Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Downloads" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact**: \`Xsign-xcodeproj-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Run**: [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
