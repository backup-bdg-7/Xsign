name: Generate & Update Xcode Project

on:
  push:
    branches:
      - main
      - feat/swift-package-setup
    paths:
      - 'project.yml'      # Only trigger when project.yml changes
      - 'Package.swift'
      - 'Xsign/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-xcodeproj:
    name: Generate and Commit Xcode Project
    runs-on: macos-latest
    
    permissions:
      contents: write   # Required to push changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Clean Old Project
        run: rm -rf Xsign.xcodeproj

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Resolve Swift Package Dependencies
        run: |
          echo "Resolving SwiftPM packages..."
          xcodebuild -resolvePackageDependencies -project Xsign.xcodeproj -scheme Xsign || true

      - name: Commit and Push Updated Xcode Project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add only the project.pbxproj and necessary files (avoid committing user-specific stuff)
          git add Xsign.xcodeproj/project.pbxproj
          git add Xsign.xcodeproj/project.xcworkspace/xcshareddata/*.xcscmblueprint || true
          git add Xsign.xcodeproj/xcshareddata/xcschemes/*.xcscheme || true
          
          if git diff --staged --quiet; then
            echo "No changes to the Xcode project."
          else
            git commit -m "chore: update Xsign.xcodeproj [generated by XcodeGen]"
            git push
            echo "✅ Successfully committed and pushed updated Xcode project to main."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Xcode Project as Artifact (optional backup)
        uses: actions/upload-artifact@v4
        with:
          name: Xsign-xcodeproj-${{ github.sha }}
          path: Xsign.xcodeproj/
          retention-days: 7
