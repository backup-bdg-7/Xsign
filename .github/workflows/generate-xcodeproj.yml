name: Analyze & Generate Xcode Project

on:
  push:
    branches:
      - main
      - feat/swift-package-setup
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  analyze-and-generate:
    name: Analyze Code & Generate Xcode Project
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Show Xcode Version
        run: |
          xcodebuild -version
          sw_vers

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Analyze Project Structure
        run: |
          echo "## Project Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Swift Files" >> $GITHUB_STEP_SUMMARY
          find Xsign -name "*.swift" | wc -l | xargs echo "Count:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### File List" >> $GITHUB_STEP_SUMMARY
          find Xsign -type f \( -name "*.swift" -o -name "*.h" -o -name "*.m" -o -name "*.mm" \) | sort >> $GITHUB_STEP_SUMMARY

      - name: Generate Xcode Project
        run: |
          echo "## Generating Xcode Project" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          xcodegen generate --spec project.yml
          echo "✅ Project generated!" >> $GITHUB_STEP_SUMMARY
          ls -la Xsign.xcodeproj >> $GITHUB_STEP_SUMMARY

      - name: Upload Xcode Project
        uses: actions/upload-artifact@v4
        with:
          name: Xsign-xcodeproj-${{ github.sha }}
          path: Xsign.xcodeproj
          retention-days: 90

      - name: Commit and Push
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/swift-package-setup')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Xsign.xcodeproj
          if ! git diff --staged --quiet; then
            git commit -m "chore: Auto-generate Xcode project [skip ci]"
            git push origin ${{ github.ref_name }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Downloads" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: Xsign-xcodeproj-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
