name: Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build Xsign (Simulator)
        run: |
          # Find available simulators
          xcrun simctl list devices available | grep -i "iPhone" | head -5
          
          # Build for simulator with generic destination
          xcodebuild clean build \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ./DerivedData

          mkdir -p upload
          cp -r ./DerivedData/Build/Products/Release-iphonesimulator/*.app upload/
