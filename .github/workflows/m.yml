name: Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    runs-on: macos-26     # ← newer runner, better Xcode pre-install

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'   # Use 16.4 to avoid Xcode 26 compiler bugs

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build Xsign (Device)
        run: |
          xcodebuild build \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            -derivedDataPath ./DerivedData

          mkdir -p upload
          cp -r ./DerivedData/Build/Products/Release-iphoneos/*.app upload/
