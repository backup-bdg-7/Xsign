name: Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build Xsign
        run: |
          set -x
          
          # List available simulators
          xcrun simctl list devices available | grep -i "iPhone 16"
          
          # Use iPhone 16 Pro by name (avoid UUID issues)
          SIM_NAME="iPhone 16 Pro"
          
          # Show available destinations for the scheme
          xcodebuild -showdestinations -project Xsign.xcodeproj -scheme Xsign
          
          # Boot the simulator (try both available ones)
          xcrun simctl boot "iPhone 16 Pro" 2>/dev/null || \
          xcrun simctl boot "iPhone 16 Pro Max" 2>/dev/null || \
          echo "Simulator already booted or not found"
          
          # Build for the simulator using name instead of ID
          xcodebuild build \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -destination "platform=iOS Simulator,name=$SIM_NAME" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ./DerivedData

          mkdir -p upload
          cp -r ./DerivedData/Build/Products/Release-iphonesimulator/*.app upload/ || echo "No .app found"
