name: Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Debug destinations
        run: |
          # Show what xcodebuild thinks are valid destinations
          xcodebuild -showdestinations -project Xsign.xcodeproj -scheme Xsign 2>&1 | tee destinations.txt
          cat destinations.txt
          
      - name: Build Xsign
        run: |
          # Try building with explicit SDK path
          SDK_PATH=$(xcrun --show-sdk-path --sdk iphonesimulator)
          echo "SDK Path: $SDK_PATH"
          
          xcodebuild build \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -sdk "$SDK_PATH" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ./DerivedData

          mkdir -p upload
          cp -r ./DerivedData/Build/Products/Release-iphonesimulator/*.app upload/ || echo "No .app found"
