name: Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Debug destinations
        run: |
          # Show what xcodebuild thinks are valid destinations
          xcodebuild -showdestinations -project Xsign.xcodeproj -scheme Xsign 2>&1 | tee destinations.txt
          cat destinations.txt
          
      - name: Boot Simulator
        run: |
          # Boot iPhone 16 Pro simulator
          xcrun simctl boot "iPhone 16 Pro" 2>/dev/null || \
          xcrun simctl boot "iPhone 16 Pro Max" 2>/dev/null || \
          echo "Simulator already booted or not found"
          
          # Verify simulator is booted
          xcrun simctl list devices booted
          
      - name: Build Xsign
        run: |
          # Build for simulator
          xcodebuild build \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -sdk $(xcrun --show-sdk-path --sdk iphonesimulator) \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ./DerivedData

          mkdir -p upload
          cp -r ./DerivedData/Build/Products/Release-iphonesimulator/*.app upload/ || echo "No .app found"
