name: Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build Xsign
        run: |
          set -x
          
          # List available simulators
          xcrun simctl list devices available | grep -i "iPhone 16"
          
          # Get the first available iPhone 16 Pro simulator ID (UUID format)
          SIM_INFO=$(xcrun simctl list devices available | grep "iPhone 16 Pro" | head -1)
          echo "Sim info: $SIM_INFO"
          
          # Extract UUID (format: XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX)
          SIM_ID=$(echo "$SIM_INFO" | grep -oE '[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}' | head -1)
          echo "Using simulator ID: $SIM_ID"
          
          # Show available destinations for the scheme
          xcodebuild -showdestinations -project Xsign.xcodeproj -scheme Xsign
          
          # Boot the simulator (required for xcodebuild)
          xcrun simctl boot "$SIM_ID" || echo "Simulator already booted"
          
          # Build for the simulator
          xcodebuild build \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ./DerivedData

          mkdir -p upload
          cp -r ./DerivedData/Build/Products/Release-iphonesimulator/*.app upload/ || echo "No .app found"
