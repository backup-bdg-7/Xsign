name: Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Show Destinations
        run: |
          xcodebuild -list -project Xsign.xcodeproj
          xcodebuild -showdestinations -project Xsign.xcodeproj -scheme Xsign 2>&1 | grep -v "^Resolving\|^Fetching\|^Checking\|^Creating" | head -50

      - name: Build Xsign
        run: |
          # Try building the target directly without scheme
          xcodebuild build \
            -project Xsign.xcodeproj \
            -target Xsign \
            -sdk iphonesimulator \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ./DerivedData

          ls -la ./DerivedData/Build/Products/Release-iphonesimulator/ 2>/dev/null || echo "Build failed"
