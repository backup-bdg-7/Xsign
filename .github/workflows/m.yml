name: Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build Xsign (Device)
        run: |
          # Build for device (no signing required)
          xcodebuild build \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ./DerivedData

          # Create IPA
          mkdir -p upload/Payload
          cp -r ./DerivedData/Build/Products/Release-iphoneos/*.app upload/Payload/
          cd upload && zip -r Xsign.ipa Payload/
          rm -rf Payload

          echo "IPA created at upload/Xsign.ipa"
          ls -la upload/
