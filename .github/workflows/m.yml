name: Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build Xsign
        run: |
          # List schemes and SDKs
          xcodebuild -list -project Xsign.xcodeproj
          xcodebuild -showsdks
          
          # Build for simulator with verbose output
          xcodebuild -verbose build \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -sdk $(xcrun --show-sdk-path --sdk iphonesimulator) \
            -arch x86_64 \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ./DerivedData 2>&1 | tee build_output.txt
          
          # Check build output
          tail -100 build_output.txt
          
          mkdir -p upload
          cp -r ./DerivedData/Build/Products/Release-iphonesimulator/*.app upload/ || echo "No .app found"
