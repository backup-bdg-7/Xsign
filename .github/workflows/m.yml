name: Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    runs-on: macos-26     # ← newer runner, better Xcode pre-install

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        run: |
          # List available Xcode versions
          ls -la /Applications/ | grep Xcode || true
          # Use default Xcode on macos-26
          sudo xcode-select -s /Applications/Xcode.app || sudo xcode-select -s /Applications/Xcode_26.app || true
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build Xsign (Device) for iOS 15+
        run: |
          xcodebuild clean build \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ./DerivedData \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

          # Create IPA structure
          mkdir -p Payload/Xsign.app
          cp -r ./DerivedData/Build/Products/Release-iphoneos/Xsign.app/* Payload/Xsign.app/
          
          # Create IPA
          mkdir -p upload
          zip -r upload/Xsign.ipa Payload/
          rm -rf Payload
          
          echo "IPA created at upload/Xsign.ipa"
          ls -la upload/
