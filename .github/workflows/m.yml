name: Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Build with Makefile
        run: |
          make build

      - name: Verify Build
        run: |
          ls -la ./DerivedData/Build/Products/Release-iphonesimulator/ 2>/dev/null || echo "Build output directory"
          find ./DerivedData -name "*.app" -type d | head -5 || echo "No .app found"
