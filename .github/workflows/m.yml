name: Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build:
    runs-on: macos-15     # Using macOS 15 for better Xcode compatibility

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'   # Stable version available on macOS 15

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build Xsign (Simulator)
        run: |
          xcodebuild build \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            -derivedDataPath ./DerivedData

          mkdir -p upload
          cp -r ./DerivedData/Build/Products/Release-iphonesimulator/*.app upload/
