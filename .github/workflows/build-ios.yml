# GitHub Actions Workflow for Xsign iOS App
# Builds UNSIGNED IPA for iOS devices only

name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'true'

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.0.app

      - name: Compile Xsign
        run: |
          agvtool new-version -all $(git rev-parse HEAD)
          make
          mkdir upload
          mv packages/* upload/
