# GitHub Actions Workflow for Xsign iOS App
# Builds UNSIGNED IPA for iOS devices only

name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'true'

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.0.app

      - name: Compile Xsign
        run: |
          make
          mkdir -p upload
          mv packages/* upload/ || true

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xsign-iOS-Build
          path: upload/
          retention-days: 30
