name: Build Xsign

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.2'

    - name: Build Library
      run: |
        swift build -c release

    - name: Generate Project and Build App
      run: |
        # In a real environment, we would use xcodegen or provide the .xcodeproj
        # For now we ensure the code compiles as a library
        swift build --target XsignCore
