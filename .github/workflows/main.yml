name: Build Xsign

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.2'

    - name: Install iOS Platform
      run: |
        sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        xcodebuild -downloadPlatform iOS || echo "iOS platform may already be installed"

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Project
      run: xcodegen generate

    - name: List Available SDKs and Destinations
      run: |
        xcodebuild -showsdks
        xcodebuild -project Xsign.xcodeproj -list
        xcodebuild -project Xsign.xcodeproj -scheme Xsign -showdestinations 2>&1 | head -50 || echo "Failed to show destinations"

    - name: Build App
      run: |
        xcodebuild build -project Xsign.xcodeproj \
                   -scheme Xsign \
                   -sdk iphonesimulator \
                   -destination 'platform=iOS Simulator,name=iPhone 16' \
                   -configuration Release \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   ONLY_ACTIVE_ARCH=NO

    - name: Create IPA from build output
      run: |
        mkdir -p build/Payload
        if [ -d "build/Release-iphoneos/Xsign.app" ]; then
          cp -r build/Release-iphoneos/Xsign.app build/Payload/
        else
          echo "Error: Xsign.app not found in build output"
          find . -name "Xsign.app" -type d 2>/dev/null || echo "No Xsign.app found"
          exit 1
        fi
        cd build && zip -r Xsign.ipa Payload

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Xsign-ipa
        path: build/Xsign.ipa
