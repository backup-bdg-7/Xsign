name: Build Xsign

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.2'

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Project
      run: xcodegen generate

    - name: Build App
      run: |
        xcodebuild -project Xsign.xcodeproj \
                   -scheme Xsign \
                   -configuration Release \
                   -archivePath Xsign.xcarchive \
                   archive \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO

    - name: Export IPA
      run: |
        mkdir -p build/Payload
        cp -r Xsign.xcarchive/Products/Applications/Xsign.app build/Payload/
        cd build
        zip -r Xsign.ipa Payload

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Xsign-ipa
        path: build/Xsign.ipa
