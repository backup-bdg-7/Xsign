name: Build Xsign

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.2'

    - name: Install iOS Platform (Device SDK)
      run: |
        sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        xcodebuild -downloadPlatform iOS -quiet || true
        xcodebuild -showsdks

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Project
      run: xcodegen generate

    - name: Build for iOS Device (iphoneos)
      run: |
        xcodebuild build -project Xsign.xcodeproj \
                   -scheme Xsign \
                   -sdk iphoneos \
                   -destination 'generic/platform=iOS' \
                   -configuration Release \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   ONLY_ACTIVE_ARCH=NO

    - name: Create IPA
      run: |
        mkdir -p build/Payload
        if [ -d "build/Release-iphoneos/Xsign.app" ]; then
          cp -r build/Release-iphoneos/Xsign.app build/Payload/
        else
          echo "Error: Xsign.app not found"
          find . -name "Xsign.app" -type d 2>/dev/null
          exit 1
        fi
        cd build && zip -r Xsign.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Xsign-ipa
        path: build/Xsign.ipa
