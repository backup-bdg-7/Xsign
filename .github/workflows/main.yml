name: Build Xsign

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.4'

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Project
      run: xcodegen generate

    - name: Show Xcode and SDK Info
      run: |
        xcodebuild -version
        xcodebuild -showsdks
        xcodebuild -project Xsign.xcodeproj -list
        xcodebuild -project Xsign.xcodeproj -scheme Xsign -showdestinations

    - name: Build for iOS Simulator
      run: |
        # Build for iOS Simulator - use any available
        xcodebuild build -project Xsign.xcodeproj \
                   -scheme Xsign \
                   -sdk iphonesimulator \
                   -destination 'platform=iOS Simulator,name=iPhone 15' \
                   -configuration Release \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   ONLY_ACTIVE_ARCH=YES

    - name: Build Succeeded
      run: echo "✅ Xsign project builds successfully (simulator)"
