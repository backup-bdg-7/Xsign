name: Build Xsign

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Select Xcode 16.2
      run: |
        # List available Xcode versions
        ls /Applications/ | grep Xcode
        # Select Xcode 16.2
        sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        xcodebuild -version

    - name: Download iOS Platform
      run: |
        # Download iOS SDK and Simulator runtime
        xcodebuild -downloadPlatform iOS -quiet || true
        # Verify SDK is available
        xcodebuild -showsdks

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Project
      run: xcodegen generate

    - name: Show Xcode and SDK Info
      run: |
        xcodebuild -project Xsign.xcodeproj -list
        xcodebuild -project Xsign.xcodeproj -scheme Xsign -showdestinations

    - name: Build for iOS Device
      run: |
        # Build for iOS device (not simulator) as requested
        xcodebuild build -project Xsign.xcodeproj \
                   -scheme Xsign \
                   -sdk iphoneos \
                   -destination 'generic/platform=iOS' \
                   -configuration Release \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   ONLY_ACTIVE_ARCH=YES

    - name: Build Succeeded
      run: echo "✅ Xsign built successfully for iOS device"
