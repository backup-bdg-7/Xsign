name: Build Xsign

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.2'

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Project
      run: xcodegen generate

    - name: Build App
      run: |
        xcodebuild -project Xsign.xcodeproj \
                   -scheme Xsign \
                   -configuration Release \
                   -archivePath Xsign.xcarchive \
                   archive \
                   CODE_SIGNING_ALLOWED=NO
