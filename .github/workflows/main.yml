name: Build Xsign

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.2'

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Install iOS Platform and Simulator Runtime
      run: |
        sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        # Download iOS platform (SDK + Simulator Runtime)
        xcodebuild -downloadPlatform iOS -quiet || true
        # Verify simulators are available
        xcrun simctl list runtimes

    - name: Generate Project
      run: xcodegen generate

    - name: Show Xcode and SDK Info
      run: |
        xcodebuild -version
        xcodebuild -showsdks
        xcodebuild -project Xsign.xcodeproj -list
        xcodebuild -project Xsign.xcodeproj -scheme Xsign -showdestinations

    - name: Build for iOS Simulator (verify compilation)
      run: |
        # Build for iOS Simulator without explicit destination
        # Let xcodebuild choose the best available destination
        xcodebuild build -project Xsign.xcodeproj \
                   -scheme Xsign \
                   -sdk iphonesimulator \
                   -configuration Release \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   ONLY_ACTIVE_ARCH=YES

    - name: Build Succeeded
      run: echo "✅ Xsign project builds successfully (simulator)"
