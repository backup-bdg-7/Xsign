name: iOS Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App (Release)
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve Swift Package Dependencies
        run: |
          echo "🔄 Resolving Swift Package Manager dependencies..."
          xcodebuild \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -resolvePackageDependencies

      - name: Build Archive
        run: |
          mkdir -p build_logs

          echo "🚀 Starting Xcode archive..."

          xcodebuild \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            clean archive \
            -archivePath ./Xsign.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            | tee build_logs/build.log

          if grep -q "ARCHIVE SUCCEEDED" build_logs/build.log; then
            echo "✅ Archive succeeded"
          else
            echo "❌ Archive failed"
            echo ""
            echo "=== Last 200 lines ==="
            tail -200 build_logs/build.log
            exit 1
          fi

      - name: Export Archive to IPA
        run: |
          echo "📦 Exporting archive to IPA..."

          # Create export options plist for ad-hoc / development export
          cat > exportOptions.plist << EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>ad-hoc</string>
    <key>provisioningProfiles</key>
    <dict/>
    <key>signingStyle</key>
    <string>automatic</string>
    <key>destination</key>
    <string>export</string>
    <key>teamID</key>
    <string></string>
</dict>
</plist>
EOF

          xcodebuild \
            -exportArchive \
            -archivePath ./Xsign.xcarchive \
            -exportPath ./exported \
            -exportOptionsPlist exportOptions.plist \
            | tee -a build_logs/build.log

          echo "✅ Export completed. Available files:"
          ls -la exported/

      - name: Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Xsign-IPA
          path: exported/Xsign.ipa
          retention-days: 7

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: build_logs/
          retention-days: 14
