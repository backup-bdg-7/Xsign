name: iOS Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Regenerate Xcode Project
        run: |
          echo "Regenerating Xcode project with XcodeGen..."
          brew install xcodegen 2>/dev/null || true
          xcodegen generate --spec Xsign/project.yml
          echo "Xcode project regenerated"

      - name: Resolve Swift Packages
        run: |
          echo "🔄 Resolving Swift Package dependencies..."
          xcodebuild -project Xsign.xcodeproj -scheme Xsign -resolvePackageDependencies

      - name: Build Archive
        run: |
          mkdir -p build_logs
          echo "🚀 Starting Xcode archive build..."
          xcodebuild \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            clean archive \
            -archivePath ./Xsign.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            | tee build_logs/build.log
          if ! grep -q "ARCHIVE SUCCEEDED" build_logs/build.log; then
            echo "❌ Archive failed"
            echo "=== Last 200 lines of log ==="
            tail -200 build_logs/build.log
            exit 1
          fi
          echo "✅ Archive built successfully"

      - name: Create IPA Manually
        run: |
          echo "📦 Creating Xsign.ipa manually..."
          mkdir -p _build/Payload
          cp -R Xsign.xcarchive/Products/Applications/*.app _build/Payload/Xsign.app
          chmod -R 0755 _build/Payload/Xsign.app
          codesign --force --sign - --timestamp=none _build/Payload/Xsign.app
          cp deps/* _build/Payload/Xsign.app/ 2>/dev/null || true
          mkdir -p packages
          ditto -c -k --sequesterRsrc --keepParent _build/Payload "packages/Xsign.ipa"
          echo "✅ IPA created successfully:"
          ls -lh packages/

      - name: Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Xsign.ipa
          path: packages/Xsign.ipa
          retention-days: 7

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build_logs/
          retention-days: 14
