name: iOS Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App (Release)
    runs-on: macos-14
    timeout-minutes: 50

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Debug Project Structure
        run: |
          echo "📁 Root directory contents:"
          ls -la
          echo ""
          echo "📁 Inside Xsign.xcodeproj:"
          ls -la Xsign.xcodeproj/

      - name: Build Archive (Release)
        run: |
          mkdir -p build_logs

          echo "🚀 Starting Xcode archive (Release)..."

          xcodebuild \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            clean archive \
            -archivePath ./Xsign.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            | tee build_logs/build.log

          if grep -q "ARCHIVE SUCCEEDED" build_logs/build.log; then
            echo "✅ Archive succeeded"
          else
            echo "❌ Archive failed"
            echo ""
            echo "=== Last 150 lines of build log ==="
            tail -150 build_logs/build.log
            exit 1
          fi

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: build_logs/
          retention-days: 14
