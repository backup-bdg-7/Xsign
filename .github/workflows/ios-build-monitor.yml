name: iOS Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Archive
        run: |
          mkdir -p build_logs

          echo "🚀 Starting Xcode build..."

          xcodebuild \
            -project Xsign.xcodeproj \
            -scheme Xsign \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            clean archive \
            -archivePath ./Xsign.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            | tee build_logs/build.log

          if grep -q "ARCHIVE SUCCEEDED" build_logs/build.log; then
            echo "✅ Build succeeded"
          else
            echo "❌ Build failed"
            echo ""
            echo "=== Last 100 lines of build log ==="
            tail -100 build_logs/build.log
            exit 1
          fi

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: build_logs/
          retention-days: 14
